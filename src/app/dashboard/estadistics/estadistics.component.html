<!-- Header -->
<div class="dashboard-header">
  <div>
    <h2 class="dashboard-title">Estadísticas de Casos</h2>
    <p class="dashboard-sub">{{ tituloPeriodo }}</p>
  </div>
  <mat-form-field appearance="outline" class="year-select">
    <mat-label>Período</mat-label>
    <mat-select [(ngModel)]="selectedYear" (selectionChange)="onYearChange($event.value)">
      <mat-option [value]="'all'">General</mat-option>
      @for (y of yearsDisponibles; track y) {
        @if (y !== 'all') {
          <mat-option [value]="y">{{ y }}</mat-option>
        }
      }
    </mat-select>
  </mat-form-field>
</div>

<div class="stats-container">

  <!-- Spinner overlay -->
  <div class="overlay-stats" *ngIf="isLoading">
    <mat-spinner diameter="50"></mat-spinner>
  </div>

  <!-- KPI Cards -->
  <div class="kpi-wrap">
    @for (item of exps; track item.key) {
      <mat-card class="kpi-card" [ngClass]="'kpi--' + item.key">
        <div class="kpi-top">
          <div class="kpi-icon">
            <mat-icon>{{ item.icon }}</mat-icon>
          </div>
        </div>
        <div class="kpi-value">{{ item.amount || 0 }}</div>
        <div class="kpi-label">{{ item.tag }}</div>
      </mat-card>
    }
  </div>

  <!-- Charts: 2x2 grid -->
  <div class="charts-grid">

    <!-- 1. Barras por tipo -->
    <div class="chart-card">
      <apx-chart #barChart
        [series]="barChartOptions.series"
        [chart]="barChartOptions.chart"
        [xaxis]="barChartOptions.xaxis"
        [yaxis]="barChartOptions.yaxis"
        [title]="barChartOptions.title"
        [colors]="barChartOptions.colors"
        [plotOptions]="barChartOptions.plotOptions"
        [dataLabels]="barChartOptions.dataLabels"
        [legend]="barChartOptions.legend"
        [grid]="barChartOptions.grid"
        [tooltip]="barChartOptions.tooltip">
      </apx-chart>
    </div>

    <!-- 2. Stacked estado -->
    <div class="chart-card">
      <apx-chart #stackedChart
        [series]="stackedChartOptions.series"
        [chart]="stackedChartOptions.chart"
        [xaxis]="stackedChartOptions.xaxis"
        [yaxis]="stackedChartOptions.yaxis"
        [title]="stackedChartOptions.title"
        [colors]="stackedChartOptions.colors"
        [plotOptions]="stackedChartOptions.plotOptions"
        [dataLabels]="stackedChartOptions.dataLabels"
        [legend]="stackedChartOptions.legend"
        [grid]="stackedChartOptions.grid"
        [fill]="stackedChartOptions.fill"
        [tooltip]="stackedChartOptions.tooltip">
      </apx-chart>
    </div>

    <!-- 3. Radial resolución -->
    <div class="chart-card">
      <apx-chart #radialChart
        [series]="radialChartOptions.series"
        [chart]="radialChartOptions.chart"
        [labels]="radialChartOptions.labels"
        [colors]="radialChartOptions.colors"
        [plotOptions]="radialChartOptions.plotOptions"
        [legend]="radialChartOptions.legend"
        [title]="radialChartOptions.title">
      </apx-chart>
    </div>

    <!-- 4. Horizontal personas -->
    <div class="chart-card">
      <apx-chart #hBarChart
        [series]="hBarChartOptions.series"
        [chart]="hBarChartOptions.chart"
        [xaxis]="hBarChartOptions.xaxis"
        [title]="hBarChartOptions.title"
        [colors]="hBarChartOptions.colors"
        [plotOptions]="hBarChartOptions.plotOptions"
        [dataLabels]="hBarChartOptions.dataLabels"
        [legend]="hBarChartOptions.legend"
        [grid]="hBarChartOptions.grid"
        [tooltip]="hBarChartOptions.tooltip">
      </apx-chart>
    </div>

  </div>

  <!-- Area mensual (ancho completo) -->
  <div class="chart-card chart-full">
    <apx-chart #areaChart
      [series]="areaChartOptions.series"
      [chart]="areaChartOptions.chart"
      [xaxis]="areaChartOptions.xaxis"
      [yaxis]="areaChartOptions.yaxis"
      [title]="areaChartOptions.title"
      [colors]="areaChartOptions.colors"
      [stroke]="areaChartOptions.stroke"
      [fill]="areaChartOptions.fill"
      [dataLabels]="areaChartOptions.dataLabels"
      [legend]="areaChartOptions.legend"
      [grid]="areaChartOptions.grid"
      [tooltip]="areaChartOptions.tooltip">
    </apx-chart>
  </div>

  <!-- Proyección próximos 2 meses -->
  <div class="chart-card chart-full forecast-card">
    <div class="forecast-badge">
      <mat-icon>auto_graph</mat-icon>
      <span>Proyección basada en promedio móvil de 3 meses</span>
    </div>
    <apx-chart #forecastChart
      [series]="forecastChartOptions.series"
      [chart]="forecastChartOptions.chart"
      [xaxis]="forecastChartOptions.xaxis"
      [yaxis]="forecastChartOptions.yaxis"
      [title]="forecastChartOptions.title"
      [colors]="forecastChartOptions.colors"
      [stroke]="forecastChartOptions.stroke"
      [markers]="forecastChartOptions.markers"
      [fill]="forecastChartOptions.fill"
      [legend]="forecastChartOptions.legend"
      [grid]="forecastChartOptions.grid"
      [tooltip]="forecastChartOptions.tooltip"
      [annotations]="forecastChartOptions.annotations"
      [forecastDataPoints]="forecastChartOptions.forecastDataPoints">
    </apx-chart>
  </div>

  <!-- Donut alertas -->
  <div class="chart-card chart-half">
    <apx-chart #donutChart
      [series]="donutChartOptions.series"
      [chart]="donutChartOptions.chart"
      [labels]="donutChartOptions.labels"
      [colors]="donutChartOptions.colors"
      [stroke]="donutChartOptions.stroke"
      [dataLabels]="donutChartOptions.dataLabels"
      [plotOptions]="donutChartOptions.plotOptions"
      [legend]="donutChartOptions.legend"
      [title]="donutChartOptions.title">
    </apx-chart>
  </div>

</div>
