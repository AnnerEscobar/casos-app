<div class="settings-page">

  <!-- Header -->
  <div class="settings-header">
    <button mat-icon-button class="back-btn" (click)="goBack()">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <div class="header-icon">
      <mat-icon>settings</mat-icon>
    </div>
    <div>
      <h2 class="page-title">Configuraciones</h2>
      <p class="page-sub">Personaliza la apariencia y gestiona tu cuenta</p>
    </div>
  </div>

  <div class="settings-content">

    <!-- Apariencia -->
    <div class="section-card">
      <div class="section-header">
        <mat-icon class="section-icon">palette</mat-icon>
        <span class="section-title">Apariencia</span>
      </div>

      <div class="setting-row">
        <div class="setting-info">
          <mat-icon class="setting-icon">dark_mode</mat-icon>
          <div>
            <span class="setting-label">Modo oscuro</span>
            <span class="setting-desc">Cambia el tema visual de la aplicación</span>
          </div>
        </div>
        <mat-slide-toggle
          [checked]="theme.isDark"
          (change)="toggleDark()">
        </mat-slide-toggle>
      </div>
    </div>

    <!-- Cuenta -->
    <div class="section-card">
      <div class="section-header">
        <mat-icon class="section-icon">manage_accounts</mat-icon>
        <span class="section-title">Cuenta</span>
      </div>

      <div class="account-actions">

        <a class="action-row" routerLink="/change-password">
          <div class="action-left">
            <div class="action-icon-wrap">
              <mat-icon>lock_reset</mat-icon>
            </div>
            <div>
              <span class="action-label">Cambiar contraseña</span>
              <span class="action-desc">Actualiza tu contraseña de acceso</span>
            </div>
          </div>
          <mat-icon class="action-arrow">chevron_right</mat-icon>
        </a>

        <div class="divider"></div>

        <button class="action-row action-danger" (click)="cerrarSesion()">
          <div class="action-left">
            <div class="action-icon-wrap danger">
              <mat-icon>logout</mat-icon>
            </div>
            <div>
              <span class="action-label">Cerrar sesión</span>
              <span class="action-desc">Salir de la cuenta actual</span>
            </div>
          </div>
          <mat-icon class="action-arrow">chevron_right</mat-icon>
        </button>

      </div>
    </div>

  </div>
</div>
