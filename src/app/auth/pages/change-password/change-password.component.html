<div class="auth-page">

  <!-- Header -->
  <div class="auth-header">
    <button mat-icon-button class="back-btn" (click)="goBack()">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <div class="header-icon">
      <mat-icon>lock_reset</mat-icon>
    </div>
    <div>
      <h2 class="page-title">Cambiar contraseña</h2>
      <p class="page-sub">Actualiza tu contraseña de acceso al sistema</p>
    </div>
  </div>

  <!-- Form card -->
  <div class="section-card">
    <div class="section-header">
      <mat-icon class="section-icon">security</mat-icon>
      <span class="section-title">Nueva contraseña</span>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-body">

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Contraseña actual</mat-label>
        <input matInput [type]="hideCurrent ? 'password' : 'text'"
               formControlName="currentPassword">
        <button mat-icon-button matSuffix type="button"
                (click)="hideCurrent = !hideCurrent">
          <mat-icon>{{ hideCurrent ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="form.get('currentPassword')?.hasError('required')">
          Campo obligatorio
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Nueva contraseña</mat-label>
        <input matInput [type]="hideNew ? 'password' : 'text'"
               formControlName="newPassword">
        <button mat-icon-button matSuffix type="button"
                (click)="hideNew = !hideNew">
          <mat-icon>{{ hideNew ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="form.get('newPassword')?.hasError('required')">Campo obligatorio</mat-error>
        <mat-error *ngIf="form.get('newPassword')?.hasError('minlength')">Mínimo 8 caracteres</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-full">
        <mat-label>Confirmar nueva contraseña</mat-label>
        <input matInput [type]="hideConfirm ? 'password' : 'text'"
               formControlName="confirmPassword">
        <button mat-icon-button matSuffix type="button"
                (click)="hideConfirm = !hideConfirm">
          <mat-icon>{{ hideConfirm ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="form.hasError('mismatch')">Las contraseñas no coinciden</mat-error>
      </mat-form-field>

      <div class="form-actions">
        <button mat-flat-button type="submit" class="btn-submit" [disabled]="form.invalid || isLoading">
          <mat-spinner *ngIf="isLoading" diameter="18"></mat-spinner>
          <mat-icon *ngIf="!isLoading">check_circle</mat-icon>
          {{ isLoading ? 'Guardando...' : 'Guardar cambios' }}
        </button>
      </div>

    </form>
  </div>

</div>
